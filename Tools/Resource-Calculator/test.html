<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenShift Sizing Calculator - Regression Test Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: rgba(30, 31, 38, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f6f8;
            --text-secondary: #9da3b4;
            --redhat-red: #EE0000;
            --redhat-red-glow: rgba(238, 0, 0, 0.35);
            --platform-blue: #00ADEE;
            --success-green: #3fcf8e;
            --success-green-glow: rgba(63, 207, 142, 0.2);
            --error-red: #ff4d4d;
            --error-red-glow: rgba(255, 77, 77, 0.2);
            --font-stack: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 173, 238, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(238, 0, 0, 0.06) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: var(--font-stack);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(0, 0, 0, 0.2);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .redhat-dot {
            width: 14px;
            height: 14px;
            background-color: var(--redhat-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--redhat-red-glow);
        }

        .header-logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .test-summary-ribbon {
            display: flex;
            gap: 15px;
        }

        .summary-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 6px;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            min-width: 100px;
            text-align: center;
        }

        .summary-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .summary-value.success { color: var(--success-green); }
        .summary-value.error { color: var(--error-red); }

        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 75px);
            overflow: hidden;
        }

        .iframe-container {
            border-right: 1px solid var(--border-glass);
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #15161e;
        }

        .iframe-header {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        #target-frame {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
        }

        .console-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0d0e12;
        }

        .console-header {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .console-header h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .test-log {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .log-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .log-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
            margin-bottom: 5px;
        }

        .section-title {
            color: var(--platform-blue);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .section-status {
            font-weight: 700;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .status-pass {
            background: rgba(63, 207, 142, 0.1);
            border: 1px solid var(--success-green);
            color: var(--success-green);
        }

        .status-fail {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding-left: 10px;
            line-height: 1.5;
            color: #d1d4db;
        }

        .log-entry.pass::before {
            content: "✓ ";
            color: var(--success-green);
        }

        .log-entry.fail::before {
            content: "✗ ";
            color: var(--error-red);
        }

        .log-entry.fail {
            color: var(--error-red);
            background: rgba(255, 77, 77, 0.05);
            border-radius: 4px;
            padding: 4px 10px;
        }

        .log-entry-msg {
            flex: 1;
            padding-right: 15px;
        }

        .log-entry-val {
            color: var(--text-secondary);
        }

        .console-footer {
            padding: 15px 24px;
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: flex-end;
        }

        .btn-restart {
            background: var(--platform-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: var(--font-stack);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-restart:hover {
            opacity: 0.9;
        }
    </style>
    <script src="tests.js" defer></script>
</head>
<body>
    <header class="test-header">
        <div class="header-logo">
            <span class="redhat-dot"></span>
            <h1>OpenShift Sizing Calculator - Regression Test Suite</h1>
        </div>

        <div class="test-summary-ribbon">
            <div class="summary-item">
                <span class="summary-label">Total Cases</span>
                <span class="summary-value" id="summary-total">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Passed</span>
                <span class="summary-value success" id="summary-passed">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Failed</span>
                <span class="summary-value error" id="summary-failed">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Duration</span>
                <span class="summary-value" id="summary-time">0ms</span>
            </div>
        </div>
    </header>

    <main class="main-layout">
        <!-- Live isolated iframe of index.html -->
        <div class="iframe-container">
            <div class="iframe-header">
                <span>Isolated Application Sandbox</span>
                <span id="sandbox-status">Loading Sandbox...</span>
            </div>
            <iframe id="target-frame" src="index.html"></iframe>
        </div>

        <!-- Testing Assertion Console logs -->
        <div class="console-container">
            <div class="console-header">
                <h2>Regression Test Logs</h2>
                <span id="test-status" style="font-size: 0.8rem; font-weight: 600; color: var(--success-green);">Awaiting start...</span>
            </div>

            <div class="test-log" id="test-log">
                <!-- Log cards will be dynamically injected here -->
            </div>

            <div class="console-footer">
                <button class="btn-restart" id="btn-restart-tests">Rerun Test Suite</button>
            </div>
        </div>
    </main>
</body>
</html>
